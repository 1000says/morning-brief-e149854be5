<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>準備中</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    display: grid; place-items: center; min-height: 100%;
    background: #f6f7f9; color: #1f2328;
  }
  .card {
    text-align: center; padding: 2.5rem 2rem; max-width: 30rem; width: calc(100% - 2rem);
    background: #ffffff; border: 1px solid #e5e7eb; border-radius: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%; margin: 0 auto 1.25rem;
    background: #4c8dff;
  }
  h1 { font-size: 1.35rem; font-weight: 650; margin: 0 0 .5rem; letter-spacing: .02em; }
  p { margin: 0; color: #6b7280; font-size: .95rem; line-height: 1.6; }
  .sub { margin-top: .75rem; font-size: .8rem; color: #9aa1ab; }
  @media (prefers-color-scheme: dark) {
    body { background: #0d1117; color: #e6edf3; }
    .card { background: #161b22; border-color: #30363d; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
    p { color: #9aa7b3; }
    .sub { color: #6e7681; }
  }
</style>
</head>
<body>
  <main class="card" role="status" aria-live="polite">
    <div class="dot" aria-hidden="true"></div>
    <h1>準備中</h1>
    <p>このページは自動で更新されます。<br>しばらくお待ちください。</p>
    <p class="sub">Preparing &middot; auto-updated</p>
  </main>
</body>
</html>
