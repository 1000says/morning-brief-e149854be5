name: Deploy page

# main への push（Cowork の毎朝上書き含む）で privacy-guard→deploy を実行する。
# privacy-guard が index.html に禁止パターンを検出したら deploy をブロックする（fail-closed）。
# 注意: これは「描画時のベストエフォート衛生＋更新停止アラート」であり、Public リポジトリでは
# push 時点で blob が公開される（露出そのものは防げない）。内容の redaction は生成側で担保すること。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  privacy-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan index.html for forbidden personal identifiers
        shell: bash
        run: |
          set -euo pipefail
          export LC_ALL=C.UTF-8 2>/dev/null || export LC_ALL=C 2>/dev/null || true
          f=index.html
          [ -f "$f" ] || { echo "::error::index.html not found"; exit 1; }
          fail=0
          scan() { # $1=label $2=regex
            if grep -nEi -- "$2" "$f" >/dev/null 2>&1; then
              echo "::error::Forbidden pattern detected in index.html: $1"
              grep -nEi -- "$2" "$f" | head -5 | sed 's/^/  /'
              fail=1
            fi
          }
          scan "email"           '[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}'
          scan "postal_code"     '[0-9]{3}-?[0-9]{4}'
          scan "phone_hyphen"    '0[0-9]{1,4}-[0-9]{1,4}-[0-9]{4}'
          scan "phone_plain"     '0[0-9]{9,10}([^0-9]|$)'
          scan "tracking_number" '[0-9]{4}-[0-9]{4}-[0-9]{4}'
          scan "geo_coords"      '[0-9]{1,3}\.[0-9]{4,},[[:space:]]?[0-9]{1,3}\.[0-9]{4,}'
          scan "map_url"         '(maps\.google|goo\.gl/maps|google\.[a-z.]+/maps)'
          scan "address_words"   '(丁目|番地|号室|マンション|アパート|〒)'
          if [ "$fail" = "1" ]; then
            echo "::error::Privacy guard FAILED — deployment blocked. Fix index.html and re-push."
            echo "### 🔒 Privacy guard FAILED — deployment blocked" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "Privacy guard passed."
          echo "### ✅ Privacy guard passed" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: privacy-guard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage only index.html for publishing
        run: |
          mkdir -p _site
          cp index.html _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
